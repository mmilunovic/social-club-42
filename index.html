            <div style={{ display: "flex", gap: 4 }}>
              {[t.colors.bg, t.colors.accent, t.colors.accentAlt, t.colors.accentTeal].map((col, i) => (
                <div key={i} style={{ width: 16, height: 16, background: col, border: `1px solid ${c.border}` }} />
              ))}
            </div>
            <span style={{ fontFamily: theme.fonts.ui, fontSize: 12, color: themeKey === key ? c.accent : c.text }}>{t.name}</span>
          </button>
        ))}
      </div>

      <div style={{ fontFamily: theme.fonts.display, fontSize: 14, color: c.text, marginBottom: 12 }}>WHY THIS EXISTS</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {manifesto.map(m => (
          <div key={m.title} style={{ display: "flex", gap: 12, padding: 12, border: `1px solid ${c.border}`, background: c.bgCard }}>
            <span style={{ fontSize: 20, lineHeight: 1, flexShrink: 0 }}>{m.icon}</span>
            <div>
              <div style={{ fontFamily: theme.fonts.ui, fontSize: 12, fontWeight: 700, color: c.text, marginBottom: 3 }}>{m.title}</div>
              <div style={{ fontFamily: theme.fonts.body, fontSize: 11, color: c.textMuted, lineHeight: 1.5 }}>{m.desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ============================================================
// MAIN APP
// ============================================================
function SocialClub42() {
  const [themeKey, setThemeKey] = useState(ACTIVE_THEME_KEY);
  const [screen, setScreen] = useState("feed");
  const [posts, setPosts] = useState(MOCK_POSTS);
  const theme = THEMES[themeKey];
  const c = theme.colors;

  useEffect(() => {
    theme.fontUrls.forEach(url => {
      if (!document.querySelector(`link[href="${url}"]`)) {
        const link = document.createElement("link");
        link.rel = "stylesheet"; link.href = url;
        document.head.appendChild(link);
      }
    });
  }, [themeKey]);

  const handleReact = (postId, stickerId) => {
    setPosts(prev => prev.map(p => {
      if (p.id !== postId) return p;
      const reactions = { ...p.reactions };
      reactions[stickerId] = (reactions[stickerId] || 0) + 1;
      return { ...p, reactions };
    }));
  };

  const screens = {
    feed: <FeedScreen theme={theme} posts={posts} onReact={handleReact} />,
    connect: <ConnectScreen theme={theme} />,
    post: <NewPostScreen theme={theme} />,
    friends: <FriendsScreen theme={theme} />,
    profile: <ProfileScreen theme={theme} themeKey={themeKey} onThemeChange={setThemeKey} allThemes={THEMES} />,
  };

  return (
    <div style={{
      maxWidth: 420, margin: "0 auto", minHeight: "100vh",
      background: c.bg, position: "relative", fontFamily: theme.fonts.body, overflow: "hidden",
    }}>
      <style>{`
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        * { box-sizing: border-box; }
        textarea::placeholder { color: ${c.textDim}; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: ${c.bg}; }
        ::-webkit-scrollbar-thumb { background: ${c.border}; }
      `}</style>
      <CRTOverlay enabled={c.crt} />
      <div style={{ padding: "12px 16px", borderBottom: `1px solid ${c.border}`, background: c.bg, position: "sticky", top: 0, zIndex: 100 }}>
        <Logo theme={theme} />
      </div>
      <div style={{ overflowY: "auto" }}>{screens[screen]}</div>
      <div style={{
        position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
        width: "100%", maxWidth: 420, background: c.bg,
        borderTop: `1px solid ${c.border}`, display: "flex", padding: "4px 0 8px", zIndex: 100,
      }}>
        {[
          { icon: "📰", label: "Feed", key: "feed" },
          { icon: "👥", label: "Friends", key: "friends" },
          { icon: "📡", label: "Connect", key: "connect" },
          { icon: "✏️", label: "Post", key: "post" },
          { icon: "⚙️", label: "Profile", key: "profile" },
        ].map(n => (
          <NavItem key={n.key} icon={n.icon} label={n.label} active={screen === n.key} onClick={() => setScreen(n.key)} theme={theme} />
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SocialClub42 />);
</script>
</body>
</html>
