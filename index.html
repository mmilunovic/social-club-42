const CRTOverlay = ({ enabled }) => enabled ? (
  <div style={{
    position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
    pointerEvents: "none", zIndex: 9999,
    background: "repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px)",
  }} />
) : null;

const Logo = ({ theme }) => {
  const c = theme.colors;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{
        width: 32, height: 32, border: `2px solid ${c.accent}`,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontFamily: theme.fonts.display, fontSize: 16, color: c.accent, background: c.bg,
      }}>42</div>
      <div>
        <div style={{ fontFamily: theme.fonts.display, fontSize: 14, color: c.text, letterSpacing: 1, lineHeight: 1 }}>SOCIAL CLUB</div>
        <div style={{ fontFamily: theme.fonts.body, fontSize: 8, color: c.textMuted, letterSpacing: 2, marginTop: 2 }}>REAL FRIENDS ONLY</div>
      </div>
    </div>
  );
};

const Avatar = ({ letter, color, size = 36, theme }) => (
  <div style={{
    width: size, height: size, minWidth: size, border: `2px solid ${color}`,
    display: "flex", alignItems: "center", justifyContent: "center",
    fontFamily: theme.fonts.display, fontSize: size * 0.45, color, background: "transparent",
  }}>{letter}</div>
);

const ACKEYS = ["accent", "accentAlt", "accentTeal", "accentLavender", "accentPink"];
const getAvatarColor = (uid, c) => c[ACKEYS[uid.charCodeAt(0) % ACKEYS.length]];

const StickerBadge = ({ stickerId, count, onClick, theme }) => {
  const c = theme.colors;
  const s = getStickerById(stickerId);
  if (!s) return null;
  return (
    <button onClick={() => onClick(stickerId)} style={{
      background: c.surface, border: `1px solid ${c.border}`, padding: "4px 8px",
      cursor: "pointer", display: "flex", alignItems: "center", gap: 5, transition: "border-color 0.15s",
    }}
      onMouseEnter={e => e.currentTarget.style.borderColor = c.accent}
      onMouseLeave={e => e.currentTarget.style.borderColor = c.border}
    >
      <img src={s.src} alt={s.label || s.id} title={s.label || s.id} style={{ width: 22, height: 22, objectFit: "contain" }} />
      <span style={{ fontSize: 11, color: c.textMuted, fontFamily: theme.fonts.ui }}>{count}</span>
    </button>
  );
};

const PostCard = ({ post, theme, onReact }) => {
  const c = theme.colors;
  const user = MOCK_USERS[post.author];
  const [hovered, setHovered] = useState(false);
  const [showPicker, setShowPicker] = useState(false);
  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => { setHovered(false); setShowPicker(false); }}
      style={{
        background: hovered ? c.bgCardHover : c.bgCard,
        border: `1px solid ${c.border}`, padding: 16, marginBottom: 8, transition: "all 0.15s ease",
      }}
    >
      <div style={{ display: "flex", gap: 12 }}>
        <Avatar letter={user.avatar} color={getAvatarColor(post.author, c)} theme={theme} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap" }}>
            <span style={{ fontFamily: theme.fonts.ui, fontSize: 13, fontWeight: 700, color: c.text }}>{user.name}</span>
            <span style={{ fontFamily: theme.fonts.body, fontSize: 11, color: c.textMuted }}>{user.handle}</span>
            <span style={{ fontFamily: theme.fonts.body, fontSize: 10, color: c.textDim, marginLeft: "auto" }}>{post.time}</span>
          </div>
          <div style={{ fontFamily: theme.fonts.body, fontSize: 13, lineHeight: 1.6, color: c.text, marginTop: 8 }}>{post.text}</div>
          {post.hasImage && (
            <div style={{
              marginTop: 12, height: 160, border: `1px solid ${c.border}`,
              background: `repeating-linear-gradient(45deg, ${c.surface}, ${c.surface} 10px, ${c.bgCard} 10px, ${c.bgCard} 20px)`,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontFamily: theme.fonts.display, fontSize: 14, color: c.textMuted,
            }}>[ IMAGE ]</div>
          )}
          {post.link && (
            <div style={{
              marginTop: 8, padding: "6px 10px", border: `1px dashed ${c.borderAccent}`,
              fontFamily: theme.fonts.body, fontSize: 11, color: c.accent,
              overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
            }}>🔗 {post.link}</div>
          )}
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
            {Object.entries(post.reactions).map(([id, count]) => (
              <StickerBadge key={id} stickerId={id} count={count} onClick={(id) => onReact(post.id, id)} theme={theme} />
            ))}
            <button onClick={() => setShowPicker(!showPicker)} style={{
              background: "transparent", border: `1px dashed ${c.border}`, padding: "4px 8px",
              cursor: "pointer", fontSize: 12, color: c.textMuted, fontFamily: theme.fonts.body,
            }}>+</button>
          </div>
          {showPicker && (
            <div style={{
              display: "flex", gap: 4, padding: 8, background: c.surface,
              border: `1px solid ${c.border}`, marginTop: 6,
            }}>
              {STICKER_REACTIONS.map(s => (
                <button key={s.id} onClick={() => { onReact(post.id, s.id); setShowPicker(false); }} style={{
                  background: "transparent", border: "1px solid transparent", cursor: "pointer",
                  padding: 6, transition: "border-color 0.1s", display: "flex", alignItems: "center", justifyContent: "center",
                }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = c.accent}
                  onMouseLeave={e => e.currentTarget.style.borderColor = "transparent"}
                >
                  <img src={s.src} alt={s.label || s.id} title={s.label || s.id} style={{ width: 32, height: 32, objectFit: "contain" }} />
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

const NavItem = ({ icon, label, active, onClick, theme }) => {
  const c = theme.colors;
  return (
    <button onClick={onClick} style={{
      display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
      background: "transparent", border: "none", cursor: "pointer",
      padding: "8px 12px", color: active ? c.accent : c.textMuted, transition: "color 0.15s", flex: 1,
    }}>
      <span style={{ fontSize: 20 }}>{icon}</span>
      <span style={{ fontFamily: theme.fonts.ui, fontSize: 9, letterSpacing: 1, textTransform: "uppercase" }}>{label}</span>
    </button>
  );
};

const FeedScreen = ({ theme, posts, onReact }) => {
  const c = theme.colors;
  const n = posts.length;
  return (
    <div style={{ padding: "0 12px 80px" }}>
      <div style={{ padding: "12px 0", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${c.border}`, marginBottom: 12 }}>
        <span style={{ fontFamily: theme.fonts.display, fontSize: 14, color: c.text }}>TODAY'S FEED</span>
        <span style={{ fontFamily: theme.fonts.display, fontSize: 14, color: n >= 42 ? c.danger : c.accent }}>{n}/42</span>
      </div>
      <div style={{ width: "100%", height: 4, background: c.surface, marginBottom: 16, overflow: "hidden" }}>
        <div style={{ width: `${(n / 42) * 100}%`, height: "100%", background: n >= 42 ? c.danger : c.accent, transition: "width 0.3s ease" }} />
      </div>
      {posts.map(p => <PostCard key={p.id} post={p} theme={theme} onReact={onReact} />)}
      {n < 42 && (
        <div style={{ textAlign: "center", padding: 24, fontFamily: theme.fonts.body, fontSize: 12, color: c.textDim, borderTop: `1px dashed ${c.border}`, marginTop: 8 }}>
          — You've seen everything for now. Check back later. —
        </div>
      )}
    </div>
  );
};

const ConnectScreen = ({ theme }) => {
  const c = theme.colors;
  const [state, setState] = useState("idle");
  return (
    <div style={{ padding: "40px 24px 80px", display: "flex", flexDirection: "column", alignItems: "center", textAlign: "center" }}>
      <div style={{ fontFamily: theme.fonts.display, fontSize: 24, color: c.text, marginBottom: 8 }}>CONNECT</div>
      <div style={{ fontFamily: theme.fonts.body, fontSize: 12, color: c.textMuted, marginBottom: 40, maxWidth: 260, lineHeight: 1.6 }}>
        Tap phones with a friend to connect. No follows. No requests. Just a tap.
      </div>
      <button onClick={() => { setState("scanning"); setTimeout(() => { setState("success"); try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const o = ctx.createOscillator(); const g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.type = "sine"; o.frequency.value = 880; g.gain.setValueAtTime(0.3, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3); o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.3); } catch(e){} }, 2000); }} style={{
        width: 160, height: 160,
        border: `3px solid ${state === "success" ? c.success : state === "scanning" ? c.accent : c.border}`,
        background: state === "scanning" ? c.surface : "transparent",
        cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8,
        transition: "all 0.3s ease", animation: state === "scanning" ? "pulse 1.5s infinite" : "none",
      }}>
        <span style={{ fontSize: 40 }}>{state === "success" ? "✓" : state === "scanning" ? "📡" : "📱"}</span>
        <span style={{ fontFamily: theme.fonts.display, fontSize: 14, color: state === "success" ? c.success : state === "scanning" ? c.accent : c.text }}>
          {state === "success" ? "CONNECTED!" : state === "scanning" ? "SCANNING..." : "TAP TO START"}

// ============================================================
// MAIN APP
// ============================================================
function SocialClub42() {
  const [themeKey, setThemeKey] = useState(ACTIVE_THEME_KEY);
  const [screen, setScreen] = useState("feed");
  const [posts, setPosts] = useState(MOCK_POSTS);
  const theme = THEMES[themeKey];
  const c = theme.colors;

  useEffect(() => {
    theme.fontUrls.forEach(url => {
      if (!document.querySelector(`link[href="${url}"]`)) {
        const link = document.createElement("link");
        link.rel = "stylesheet"; link.href = url;
        document.head.appendChild(link);
      }
    });
  }, [themeKey]);

  const handleReact = (postId, stickerId) => {
    setPosts(prev => prev.map(p => {
      if (p.id !== postId) return p;
      const reactions = { ...p.reactions };
      reactions[stickerId] = (reactions[stickerId] || 0) + 1;
      return { ...p, reactions };
    }));
  };

  const screens = {
    feed: <FeedScreen theme={theme} posts={posts} onReact={handleReact} />,
    connect: <ConnectScreen theme={theme} />,
    post: <NewPostScreen theme={theme} />,
    friends: <FriendsScreen theme={theme} />,
    profile: <ProfileScreen theme={theme} themeKey={themeKey} onThemeChange={setThemeKey} allThemes={THEMES} posts={posts} />,
  };

  return (
    <div style={{
      maxWidth: 420, margin: "0 auto", height: "100vh",
      background: c.bg, position: "relative", fontFamily: theme.fonts.body, overflow: "hidden",
      display: "flex", flexDirection: "column",
    }}>
      <style>{`
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        * { box-sizing: border-box; }
        textarea::placeholder { color: ${c.textDim}; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: ${c.bg}; }
        ::-webkit-scrollbar-thumb { background: ${c.border}; }
      `}</style>
      <CRTOverlay enabled={c.crt} />
      <div style={{ padding: "12px 16px", borderBottom: `1px solid ${c.border}`, background: c.bg, zIndex: 100, flexShrink: 0 }}>
        <Logo theme={theme} />
      </div>
      <div style={{ flex: 1, overflowY: "auto", minHeight: 0 }}>{screens[screen]}</div>
      <div style={{
        position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
        width: "100%", maxWidth: 420, background: c.bg,
        borderTop: `1px solid ${c.border}`, display: "flex", padding: "4px 0 8px", zIndex: 100,
      }}>
        {[
          { icon: "📰", label: "Feed", key: "feed" },
          { icon: "👥", label: "Friends", key: "friends" },
          { icon: "📡", label: "Connect", key: "connect" },
          { icon: "✏️", label: "Post", key: "post" },
          { icon: "⚙️", label: "Profile", key: "profile" },
        ].map(n => (
          <NavItem key={n.key} icon={n.icon} label={n.label} active={screen === n.key} onClick={() => setScreen(n.key)} theme={theme} />
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SocialClub42 />);
</script>
